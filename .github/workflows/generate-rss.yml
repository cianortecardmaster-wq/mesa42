name: Atualizar RSS

on:
  push:
    branches:
      - main
    paths:
      - "js/obras-data.js"
      - "scripts/generate-rss.mjs"
      - "CNAME"
      - ".github/workflows/generate-rss.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atualizar-rss-main
  cancel-in-progress: true

jobs:
  gerar-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gerar feed.xml
        run: node scripts/generate-rss.mjs

      - name: Publicar feed atualizado
        run: |
          if git diff --quiet -- feed.xml; then
            echo "O feed.xml já está atualizado."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git commit -m "Atualiza RSS do Mesa 42"
          git push
