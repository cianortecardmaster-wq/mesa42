<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>História #001 — Command and Conquer | Mesa 42</title>
  <meta name="description" content="História #001 do Mesa 42: Command and Conquer." />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/vn.css" />
</head>
<body class="vn-body">
  <main class="vn-stage" id="vnStage" style="--scene-bg:url('../../assets/bg/quarto-jp-iluminado.webp')">
    <div class="vn-bg" id="vnBg" aria-hidden="true"></div>
    <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

    <nav class="vn-hud" aria-label="Navegação da história">
      <a href="../../">← Mesa 42</a>
      <span class="vn-title" id="storyTitle">História #001 — Command and Conquer</span>
      <button type="button" id="saveBtn">Salvar</button>
    </nav>

    <section class="vn-start" id="startScreen" aria-label="Abertura da história">
      <div class="vn-start-card">
        <span class="eyebrow">CC Master apresenta</span>
        <h1>Mesa 42</h1>
        <p>História #001 — Command and Conquer. Clique em iniciar e avance pelos pensamentos de JP como em uma visual novel.</p>
        <button class="button" type="button" id="startStoryBtn">Iniciar história</button>
      </div>
    </section>

    <section class="vn-scene" id="vnScene" aria-label="Cena da visual novel">
      <div class="characters" id="characters"></div>

      <div class="title-card" id="titleCard" hidden>
        <div class="title-card-inner">
          <h2 data-title></h2>
          <p data-subtitle></p>
        </div>
      </div>

      <img class="card-focus" id="cardFocus" src="../../assets/cards/command-and-conquer-misprint.svg" alt="Command and Conquer" hidden />

      <div class="dialogue-box" id="dialogueBox" tabindex="0" role="button" aria-label="Avançar texto" hidden>
        <div class="speaker-row">
          <span class="speaker" id="speaker">JP</span>
          <span class="speaker-mode" id="speakerMode" hidden></span>
        </div>
        <p class="line" id="lineText">Carregando história...</p>
        <div class="choices" id="choices" hidden></div>
        <span class="next-hint" id="nextHint">Clique para avançar</span>
      </div>
    </section>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/supabase-progress.js"></script>
  <script src="../../js/vn-engine.js"></script>
  <script>
    window.Mesa42VN.init({
      storyUrl: '../../data/command-and-conquer.json',
      storySlug: 'command-and-conquer',
      basePath: '../../'
    });
  </script>
</body>
</html>
